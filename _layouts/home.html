<h2>Publications</h2>
{% for group in site.data.data_publications %}
  <h3>{{ group.year }}</h3>
  <ul>
  {% for p in group.items %}
    <li>
      <strong>{{ p.title }}</strong><br/>
      <em>{{ p.authors }}</em> — {{ p.affiliation }}<br/>
      {{ p.venue }}{% if p.url %} — <a href="{{ p.url }}" target="_blank">link</a>{% endif %}
    </li>
  {% endfor %}
  </ul>
{% endfor %}

{{ content }}
